services:
  # 后端服务 - 连接共享数据库
  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: nova-client-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=nova-postgres # 指向共享数据库容器名
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=nova_space
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=3001
      - FRONTEND_URL=https://space.nwbd.net
    networks:
      - nova-network
    extra_hosts:
      - "nova-postgres:host-gateway" # 允许通过容器名访问外部容器

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nova-client-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # 宿主机:容器内
      - "8080:80"
    networks:
      - nova-network

networks:
  nova-network:
    name: nova-network # 使用共享网络
    external: true # 标记为外部网络（已存在）
